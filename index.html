<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#1D9E75">
  <title>库存扫描入库</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
    header { background: #1D9E75; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: 500; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    #reader { border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
    button { width: 100%; padding: 14px; background: #1D9E75; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; }
    button:active { background: #0F6E56; }
    #msg { text-align: center; padding: 10px; font-size: 14px; border-radius: 8px; margin-top: 10px; display: none; }
    .ok { background: #E1F5EE; color: #0F6E56; }
    .err { background: #FCEBEB; color: #A32D2D; }
  </style>
</head>
<body>
<header>库存扫描入库系统</header>
<div class="container">
  <div class="card">
    <div id="reader" style="width:100%"></div>
    <p id="scan-result" style="font-size:13px;color:#666;text-align:center">等待扫描...</p>
  </div>
  <div class="card">
    <label>条码 / 编号</label>
    <input id="barcode" placeholder="扫描后自动填入，或手动输入">
    <label>货物名称</label>
    <input id="name" placeholder="例：A4纸、螺丝M3">
    <label>入库数量</label>
    <input id="qty" type="number" value="1" min="1">
    <label>备注</label>
    <input id="remark" placeholder="可选">
    <button onclick="submitData()">确认入库</button>
    <div id="msg"></div>
  </div>
</div>
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyMJlegxjaMeC-KDvcXBx7QssGMaS4QAdjeyk4d0BMjrsn4FMK7nnUX-yiSLDd823JE/exec";

  const scanner = new Html5QrcodeScanner("reader",
    { fps: 10, qrbox: { width: 250, height: 180 } });

  scanner.render(function(text) {
    document.getElementById("barcode").value = text;
    document.getElementById("scan-result").textContent = "已扫描：" + text;
    scanner.pause();
  });

  function submitData() {
  var barcode  = document.getElementById("barcode").value;
  var name     = document.getElementById("name").value;
  var quantity = document.getElementById("qty").value;
  var remark   = document.getElementById("remark").value;
  var msg      = document.getElementById("msg");
  msg.style.display = "none";

  // 用 FormData 方式发送，解决 CORS 问题
  var form = new FormData();
  form.append("barcode",  barcode);
  form.append("name",     name);
  form.append("quantity", quantity);
  form.append("remark",   remark);

  fetch(API_URL, { method: "POST", body: form, mode: "no-cors" })
    .then(function() {
      msg.className = "ok";
      msg.textContent = "入库成功！数据已写入 Google Sheets";
      msg.style.display = "block";
      document.getElementById("barcode").value = "";
      document.getElementById("name").value = "";
      document.getElementById("qty").value = "1";
      document.getElementById("remark").value = "";
      scanner.resume();
    })
    .catch(function() {
      msg.className = "err";
      msg.textContent = "网络错误，请检查手机是否联网";
      msg.style.display = "block";
    });
}
