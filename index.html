<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>库存管理系统</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#f0f0f0}
    header{background:#1D9E75;color:white;padding:16px;text-align:center;font-size:18px;font-weight:500}
    .container{max-width:480px;margin:0 auto;padding:16px}
    .toggle-row{display:flex;gap:8px;margin-bottom:14px}
    .toggle-btn{flex:1;padding:11px;border-radius:10px;border:0.5px solid #ddd;background:white;font-size:15px;font-weight:500;cursor:pointer;color:#666}
    .toggle-btn.active-in{background:#1D9E75;color:white;border-color:#1D9E75}
    .toggle-btn.active-out{background:#D85A30;color:white;border-color:#D85A30}
    .card{background:white;border-radius:12px;padding:16px;margin-bottom:14px}
    .card-title{font-size:14px;color:#666;margin-bottom:10px;font-weight:500}
    #video-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;background:#000}
    video{width:100%;display:block}
    #scan-line{position:absolute;left:10%;width:80%;height:2px;background:#1D9E75;top:50%;animation:scan 2s linear infinite}
    @keyframes scan{0%{top:20%}50%{top:80%}100%{top:20%}}
    #scan-result{font-size:13px;color:#888;text-align:center;margin-top:8px;min-height:18px}
    label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:10px}
    input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px}
    input:focus{outline:none;border-color:#1D9E75}
    .submit-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;margin-top:16px;color:white;transition:opacity .15s}
    .submit-btn:active{opacity:.8}
    .btn-in{background:#1D9E75}
    .btn-out{background:#D85A30}
    .btn-loading{opacity:.6;pointer-events:none}
    #msg{text-align:center;padding:10px;font-size:14px;border-radius:8px;margin-top:10px;display:none;line-height:1.5}
    .ok{background:#E1F5EE;color:#0F6E56}
    .err{background:#FCEBEB;color:#A32D2D}
  </style>
</head>
<body>
<header>库存管理系统</header>
<div class="container">

  <div class="toggle-row">
    <button class="toggle-btn active-in" id="btn-in"  onclick="setMode('in')">入库</button>
    <button class="toggle-btn"           id="btn-out" onclick="setMode('out')">出库</button>
  </div>

  <div class="card">
    <div class="card-title" id="scan-title">扫描条码（入库）</div>
    <div id="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-line"></div>
    </div>
    <p id="scan-result">摄像头启动中...</p>
  </div>

  <div class="card">
    <div class="card-title" id="form-title">入库信息</div>
    <label>条码 / 编号</label>
    <input id="barcode" placeholder="扫描后自动填入，或手动输入">
    <label>货物名称</label>
    <input id="name" placeholder="扫描后自动查询，或手动输入">
    <label id="qty-label">入库数量</label>
    <input id="qty" type="number" value="1" min="1">
    <label>操作人姓名</label>
    <input id="operator" placeholder="请输入你的姓名">
    <label>备注</label>
    <input id="remark" placeholder="可选">
    <button class="submit-btn btn-in" id="submit-btn" onclick="submitData()">确认入库</button>
    <div id="msg"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
  var API_URL     = "https://script.google.com/macros/s/AKfycbyMJlegxjaMeC-KDvcXBx7QssGMaS4QAdjeyk4d0BMjrsn4FMK7nnUX-yiSLDd823JE/exec";
  var currentMode = "in";
  var audioCtx    = null;
  var scanning    = true;

  function tone(freq, start, dur, vol, type) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc  = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type || "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + dur);
      osc.start(audioCtx.currentTime + start);
      osc.stop(audioCtx.currentTime + start + dur + 0.05);
    } catch(e) {}
  }

  function beepIn()  {
    tone(1000,0,0.10,2.2); tone(1250,0.13,0.10,2.2); tone(1600,0.26,0.18,2.2);
  }
  function beepOut() { tone(420,0,0.55,2.2,"triangle"); }

  var codeReader = new ZXing.BrowserMultiFormatReader();

  codeReader.decodeFromVideoDevice(null, "video", function(result, err) {
    if (result && scanning) {
      scanning = false;
      var text = result.getText();
      document.getElementById("barcode").value = text;
      document.getElementById("scan-result").textContent = "已扫描：" + text;
      if (currentMode === "in") { beepIn(); } else { beepOut(); }
      lookupProduct(text);
    }
  });

  document.getElementById("scan-result").textContent = "对准条码即可扫描";

  function setMode(mode) {
    currentMode = mode;
    var isIn = mode === "in";
    document.getElementById("btn-in").className  = "toggle-btn" + (isIn ? " active-in" : "");
    document.getElementById("btn-out").className = "toggle-btn" + (!isIn ? " active-out" : "");
    document.getElementById("scan-title").textContent = isIn ? "扫描条码（入库）" : "扫描条码（出库）";
    document.getElementById("form-title").textContent = isIn ? "入库信息" : "出库信息";
    document.getElementById("qty-label").textContent  = isIn ? "入库数量" : "出库数量";
    var btn = document.getElementById("submit-btn");
    btn.textContent = isIn ? "确认入库" : "确认出库";
    btn.className   = "submit-btn " + (isIn ? "btn-in" : "btn-out");
    document.getElementById("barcode").value = "";
    document.getElementById("name").value    = "";
    document.getElementById("qty").value     = "1";
    document.getElementById("msg").style.display = "none";
    scanning = true;
  }

  function lookupProduct(barcode) {
    var nameField = document.getElementById("name");
    nameField.value = "查询中...";
    var localDB = {};
    if (localDB[barcode]) { nameField.value = localDB[barcode]; return; }
    fetch("https://openlibrary.org/api/books?bibkeys=ISBN:" + barcode + "&format=json&jscmd=data")
      .then(function(r){ return r.json(); })
      .then(function(d){
        var key = "ISBN:" + barcode;
        if (d[key] && d[key].title) {
          var authors = d[key].authors ? " / " + d[key].authors[0].name : "";
          nameField.value = d[key].title + authors;
        } else {
          return fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json")
            .then(function(r){ return r.json(); })
            .then(function(d2){
              if (d2.status===1 && d2.product) {
                var p = d2.product;
                var n = p.product_name_zh||p.product_name_en||p.product_name||"";
                var b = p.brands||"";
                nameField.value = (b?b+" ":"")+n||"未找到，请手动输入";
              } else { nameField.value = "未找到，请手动输入"; }
            });
        }
      })
      .catch(function(){ nameField.value = "查询失败，请手动输入"; });
  }

  function submitData() {
    var msg      = document.getElementById("msg");
    var btn      = document.getElementById("submit-btn");
    var barcode  = document.getElementById("barcode").value;
    var name     = document.getElementById("name").value;
    var quantity = document.getElementById("qty").value;
    var operator = document.getElementById("operator").value;
    var remark   = document.getElementById("remark").value;

    if (!barcode && !name) {
      msg.className="err"; msg.textContent="请先扫描条码或填写货物名称";
      msg.style.display="block"; return;
    }

    btn.classList.add("btn-loading");
    btn.textContent = "提交中...";
    msg.style.display = "none";

    var url = API_URL
      + "?action="   + currentMode
      + "&barcode="  + encodeURIComponent(barcode)
      + "&name="     + encodeURIComponent(name==="查询中..."?barcode:name)
      + "&quantity=" + encodeURIComponent(quantity)
      + "&operator=" + encodeURIComponent(operator)
      + "&remark="   + encodeURIComponent(remark);

    fetch(url, { mode:"no-cors" })
      .then(function(){
        if (currentMode==="in") { beepIn(); } else { beepOut(); }
        var label = currentMode==="in" ? "入库" : "出库";
        msg.className="ok"; msg.textContent=label+"成功！";
        msg.style.display="block";
        document.getElementById("barcode").value="";
        document.getElementById("name").value="";
        document.getElementById("qty").value="1";
        document.getElementById("remark").value="";
        scanning = true;
      })
      .catch(function(){
        msg.className="err"; msg.textContent="网络错误，请检查手机是否联网";
        msg.style.display="block";
      })
      .finally(function(){
        btn.classList.remove("btn-loading");
        btn.textContent = currentMode==="in" ? "确认入库" : "确认出库";
      });
  }
</script>
</body>
</html>
